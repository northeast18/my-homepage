<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理后台 - 个人主页</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj4KICA8c3R5bGU+CiAgICAuY2xzLTEgeyBmaWxsOiAjMmQzNzQ4OyB9CiAgPC9zdHlsZT4KICA8cGF0aCBjbGFzcz0iY2xzLTEiIGQ9Ik04NSA1MGMwLTE5LjMtMTUuNy0zNS0zNS0zNVMxNSAzMC43IDE1IDUwczE1LjcgMzUgMzUgMzUgMzUtMTUuNyAzNS0zNXptLTM1IDI1Yy0xMy44IDAtMjUtMTEuMi0yNS0yNXMxMS4yLTI1IDI1LTI1IDI1IDExLjIgMjUgMjUtMTEuMiAyNS0yNSAyNXoiLz4KICA8Y2lyY2xlIGNsYXNzPSJjbHMtMSIgY3g9IjMwIiBjeT0iNTAiIHI9IjEwIi8+CiAgPGNpcmNsZSBjbGFzcz0iY2xzLTEiIGN4PSI3MCIgY3k9IjUwIiByPSIxMCIvPgo8L3N2Zz4=" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://npm.elemecdn.com/lxgw-wenkai-webfont@latest/style.css" />
    <link rel="stylesheet" href="admin.css?v=1.4" />
</head>

<body>
    <!-- ===== 登录界面 ===== -->
    <div id="loginView" class="login-view">
        <div class="login-card">
            <div class="login-icon"><i class="fas fa-lock"></i></div>
            <h2>管理后台</h2>
            <p class="login-desc">请输入管理员密码</p>
            <form id="loginForm" autocomplete="off">
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="passwordInput" placeholder="管理员密码" required />
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
                <p class="error-msg" id="loginError"></p>
            </form>
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> 返回主页</a>
        </div>
    </div>

    <!-- ===== 管理面板 ===== -->
    <div id="adminView" class="admin-view" style="display:none;">
        <header class="admin-header">
            <div class="header-left">
                <i class="fas fa-cog"></i>
                <h1>站点管理</h1>
            </div>
            <div class="header-right">
                <a href="/" class="btn btn-sm" target="_blank"><i class="fas fa-external-link-alt"></i> 查看主页</a>
                <button class="btn btn-sm btn-danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </header>

        <main class="admin-main">
            <!-- 个人信息 -->
            <section class="panel">
                <div class="panel-header">
                    <h2><i class="fas fa-user-circle"></i> 个人信息</h2>
                </div>
                <div class="panel-body">
                    <div class="form-row">
                        <label>头像 URL</label>
                        <div class="avatar-input-group">
                            <img id="avatarPreview" class="avatar-preview" src="" alt="头像预览" />
                            <input type="text" id="inputAvatar" placeholder="粘贴头像图片链接或点击右侧上传..." />
                            <button type="button" class="upload-btn" id="uploadAvatarBtn">
                                <i class="fas fa-upload"></i> 上传
                            </button>
                        </div>
                    </div>
                    <div class="form-row">
                        <label>昵称</label>
                        <input type="text" id="inputNickname" placeholder="你的昵称" />
                    </div>
                    <div class="form-row">
                        <label>个性签名</label>
                        <input type="text" id="inputTagline" placeholder="你的个性签名" />
                    </div>
                    <div class="form-row">
                        <label>建站年份</label>
                        <input type="number" id="inputSince" placeholder="例如 2021" />
                    </div>
                </div>
            </section>

            <!-- 导航链接 -->
            <section class="panel">
                <div class="panel-header">
                    <h2><i class="fas fa-link"></i> 导航链接</h2>
                    <button class="btn btn-sm btn-primary" id="addLinkBtn"><i class="fas fa-plus"></i> 添加</button>
                </div>
                <div class="panel-body">
                    <div class="links-hint">
                        <i class="fas fa-info-circle"></i>
                        图标支持 3 种格式：<br>
                        1. 🥇 <b>最近上传</b>（点击右侧 <i class="fas fa-upload"></i> 按钮直接上传图片作为图标）<br>
                        2. 🥈 <b>SVG 代码</b>（去免费的 <a href="https://www.iconfont.cn/" target="_blank">IconFont</a>
                        网站找到喜欢的图标，点击“<b>复制 SVG 代码</b>”然后粘贴进来）<br>
                        3. 🥉 <b>图标类名</b>（下拉选择，或输入 <code>fas fa-blog</code>）
                    </div>
                    <datalist id="iconOptions">
                        <option value="fas fa-blog">博客</option>
                        <option value="fas fa-archive">归档</option>
                        <option value="fas fa-envelope">邮箱</option>
                        <option value="fab fa-github">GitHub</option>
                        <option value="fab fa-bilibili">Bilibili</option>
                        <option value="fas fa-rss">RSS</option>
                        <option value="fas fa-link">默认链接</option>
                        <option value="fas fa-home">主页</option>
                        <option value="fab fa-twitter">Twitter</option>
                        <option value="fab fa-weixin">微信</option>
                    </datalist>
                    <div id="linksContainer">
                        <!-- JS 动态渲染 -->
                    </div>
                </div>
            </section>

            <!-- 备案信息 -->
            <section class="panel">
                <div class="panel-header">
                    <h2><i class="fas fa-shield-alt"></i> 备案信息</h2>
                </div>
                <div class="panel-body">
                    <div class="form-row">
                        <label>ICP 备案号</label>
                        <input type="text" id="inputIcp" placeholder="例如：京ICP备XXXXXXXX号" />
                    </div>
                    <div class="form-row">
                        <label>公安备案号</label>
                        <input type="text" id="inputGongan" placeholder="例如：京公网安备 XXXXXXXXXXX 号" />
                    </div>
                </div>
            </section>
        </main>

        <!-- 底部保存栏 -->
        <div class="save-bar">
            <span class="save-status" id="saveStatus"></span>
            <button class="btn btn-primary btn-save" id="saveBtn">
                <i class="fas fa-save"></i> 保存所有更改
            </button>
        </div>
    </div>

    <!-- 隐藏的文件上传组件 -->
    <input type="file" id="imageUploadInput" class="file-upload-input" accept="image/*" />

    <script src="config.js?v=1.4"></script>
    <script src="admin.js?v=1.4"></script>
</body>

</html>
